name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Create Env File
        run: |
          if [ -n "${{ secrets.VITE_SUPABASE_URL }}" ]; then
            echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" > .env
            echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env
          else
            echo "VITE_SUPABASE_URL=https://grynbfymudhbilcknwdv.supabase.co" > .env
            echo "VITE_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdyeW5iZnltdWRoYmlsY2tud2R2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MzY4MTEsImV4cCI6MjA5MjUxMjgxMX0.tfDk4jVVgzd7Bj6jFtZaqDM4VaIsJlP9KCvjJ0VQlf4" >> .env
          fi

      - name: Build Web App
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Android APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Yumrate-Android-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
